<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="200" height="200" rx="16" fill="#050810"/>

  <!-- Orbit rings -->
  <ellipse cx="100" cy="100" rx="80" ry="28" stroke="#4af0c4" stroke-width="1.2" fill="none" opacity="0.35"/>
  <ellipse cx="100" cy="100" rx="80" ry="28" stroke="#3a8fff" stroke-width="1.2" fill="none" opacity="0.35" transform="rotate(60 100 100)"/>
  <ellipse cx="100" cy="100" rx="80" ry="28" stroke="#f0884a" stroke-width="1.2" fill="none" opacity="0.35" transform="rotate(120 100 100)"/>

  <!-- Inner glow -->
  <circle cx="100" cy="100" r="34" fill="#4af0c4" fill-opacity="0.04" stroke="#4af0c4" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Electrons -->
  <!-- e1 (teal)   — orbit 1, t=30° -->
  <circle cx="169" cy="114" r="5.5" fill="#4af0c4"/>
  <!-- e2 (blue)   — orbit 2 rotated 60°, t=180° -->
  <circle cx="60"  cy="31"  r="5.5" fill="#3a8fff"/>
  <!-- e3 (orange) — orbit 3 rotated 120°, t=60° -->
  <circle cx="59"  cy="123" r="5.5" fill="#f0884a"/>

  <!-- Nucleus -->
  <circle cx="100" cy="100" r="13" fill="#4af0c4"/>
  <circle cx="100" cy="100" r="8"  fill="#050810"/>
  <circle cx="100" cy="100" r="4"  fill="#4af0c4"/>

</svg>
